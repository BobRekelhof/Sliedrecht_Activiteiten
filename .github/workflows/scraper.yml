name: Scrape Sliedrecht Doet Agenda

on:
  schedule:
    # Every night at 03:00 Amsterdam time (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: # allows manual trigger via GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated activities.json
        run: |
          git config --global user.name "Sliedrecht Bot"
          git config --global user.email "bot@sliedrechtdoet.nl"
          git add activities.json
          git diff --staged --quiet || git commit -m "🔄 Agenda bijgewerkt: $(date +'%d-%m-%Y %H:%M')"
          git push
